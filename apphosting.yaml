# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runtime: nodejs20

runConfig:
  # minInstances: 0 memastikan kompatibilitas dengan paket Spark (Gratis).
  # Ubah ke 1 jika Anda sudah upgrade ke paket Blaze dan ingin menghilangkan cold-start.
  minInstances: 0
  # maxInstances: 10 memungkinkan aplikasi bertumbuh jika banyak pengguna mengakses bersamaan.
  maxInstances: 10
  memoryPerInstanceMiB: 512
