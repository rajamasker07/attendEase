# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runtime: nodejs20

runConfig:
  # minInstances: 1 memastikan aplikasi selalu siaga tanpa jeda pemuatan awal (cold start).
  # Pastikan Anda menggunakan paket Blaze untuk menggunakan fitur ini.
  minInstances: 1
  # maxInstances: 10 memungkinkan aplikasi bertumbuh jika banyak pengguna mengakses bersamaan.
  maxInstances: 10
  memoryPerInstanceMiB: 512
